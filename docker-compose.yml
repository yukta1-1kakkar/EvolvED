version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu_pass}
      POSTGRES_DB: ${POSTGRES_DB:-evolved_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    ports:
      - '8001:8000'

  backend:
    build:
      context: ./backend
    env_file: ./.env
    depends_on:
      - postgres
      - chroma
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
    env_file: ./.env
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
